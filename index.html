<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>足球游戏 - 5v5</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%; height: 100%;
            overflow: hidden;
            background: #1a1a2e;
            font-family: 'Arial', sans-serif;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
            -webkit-overflow-scrolling: none;
            position: fixed;
        }

        /* 外层包装：填满屏幕 */
        #game-wrapper {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* 竖屏时旋转整个游戏 */
        #game-wrapper.portrait #game-container {
            transform: rotate(90deg);
            width: 100vh;
            height: 100vw;
        }

        /* 游戏容器：固定横向比例 */
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            max-width: 100vw;
            max-height: 100vh;
            background: linear-gradient(180deg, #2d8b2d 0%, #3a9a3a 30%, #2d8b2d 60%, #3a9a3a 100%);
            overflow: hidden;
            border: 2px solid #fff;
            border-radius: 0;
            box-shadow: none;
            /* 保持宽大于高的比例 — 用 aspect-ratio 约束 */
            aspect-ratio: auto;
        }

        /* 桌面端横屏（宽>高）自然显示 */
        @media (min-aspect-ratio: 1/1) {
            #game-container {
                width: 100vw;
                height: 100vh;
            }
        }

        /* 桌面端有足够空间时加圆角阴影 */
        @media (min-width: 768px) and (min-aspect-ratio: 1/1) {
            #game-container {
                border-radius: 12px;
                box-shadow: 0 0 40px rgba(0,180,0,0.25), 0 0 80px rgba(0,0,0,0.4);
                border-width: 3px;
                width: 95vw;
                height: 95vh;
                max-width: 1200px;
                max-height: 750px;
            }
        }

        /* ========== 球场标记 — 百分比 ========== */
        .field-line { position: absolute; border: 1.5px solid rgba(255,255,255,0.45); }
        .field-border { top: 3%; left: 2.5%; right: 2.5%; bottom: 3%; border-radius: 6px; }
        .field-center {
            top: 50%; left: 2.5%; right: 2.5%;
            height: 1px; background: rgba(255,255,255,0.45);
            border: none; transform: translateY(-50%);
        }
        .center-circle {
            top: 50%; left: 50%;
            width: 15%; aspect-ratio: 1;
            border: 1.5px solid rgba(255,255,255,0.45);
            border-radius: 50%; transform: translate(-50%,-50%);
        }
        .center-dot {
            top: 50%; left: 50%;
            width: 8px; height: 8px;
            background: rgba(255,255,255,0.6);
            border-radius: 50%; transform: translate(-50%,-50%);
        }
        .penalty-area-left {
            top: 22%; left: 2.5%;
            width: 16%; height: 56%;
            border: 1.5px solid rgba(255,255,255,0.45);
            border-left: none; border-radius: 0 6px 6px 0;
        }
        .penalty-area-right {
            top: 22%; right: 2.5%;
            width: 16%; height: 56%;
            border: 1.5px solid rgba(255,255,255,0.45);
            border-right: none; border-radius: 6px 0 0 6px;
        }
        /* 球门在左右两侧 */
        .goal-left {
            position: absolute;
            top: 43%; left: 0.8%;
            width: 2.5%; height: 14%;
            background: rgba(255,255,255,0.12);
            border: 1.5px solid rgba(255,255,255,0.55);
            border-radius: 0 5px 5px 0;
        }
        .goal-right {
            position: absolute;
            top: 43%; right: 0.8%;
            width: 2.5%; height: 14%;
            background: rgba(255,255,255,0.12);
            border: 1.5px solid rgba(255,255,255,0.55);
            border-radius: 5px 0 0 5px;
        }

        /* ========== 球员 ========== */
        .player {
            position: absolute;
            width: 5.2%; aspect-ratio: 1;
            max-width: 44px; max-height: 44px;
            min-width: 26px; min-height: 26px;
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: clamp(7px, 1.2vw, 13px);
            color: #fff;
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
            border: 3px solid rgba(255,255,255,0.8);
        }
        .player:active { transform: scale(1.15); }
        .player.team-a { background: linear-gradient(135deg, #e74c3c, #c0392b); border-color: #ff6b6b; }
        .player.team-b { background: linear-gradient(135deg, #3498db, #2980b9); border-color: #6bb5ff; }
        .player.selected {
            box-shadow: 0 0 20px rgba(255,255,0,0.9);
            border-color: #ffff00;
            transform: scale(1.2);
            animation: pulse 0.8s infinite;
            z-index: 25;
        }
        .player.goalkeeper {
            width: 5.8%; max-width: 48px; max-height: 48px; min-width: 28px; min-height: 28px;
            font-size: clamp(6px, 1vw, 11px);
            border-width: 4px;
        }
        .player.running { animation: runAnim 0.3s ease-in-out; }

        @keyframes pulse {
            0%,100% { box-shadow: 0 0 20px rgba(255,255,0,0.9); }
            50% { box-shadow: 0 0 35px rgba(255,255,0,1.2); }
        }
        @keyframes runAnim {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }

        /* ========== 技能按钮 ========== */
        .skill-buttons {
            position: absolute;
            display: flex;
            gap: 3px;
            z-index: 20;
            pointer-events: none;
        }
        .skill-btn {
            padding: 3px 6px;
            font-size: clamp(8px, 1vw, 11px);
            border: none;
            border-radius: 6px;
            cursor: pointer;
            color: #fff;
            font-weight: bold;
            pointer-events: all;
            transition: all 0.2s;
            white-space: nowrap;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
            -webkit-tap-highlight-color: transparent;
        }
        .skill-btn:active { transform: scale(0.92); }
        .skill-btn.run-btn { background: linear-gradient(135deg, #f39c12, #e67e22); }
        .skill-btn.tackle-btn { background: linear-gradient(135deg, #e74c3c, #c0392b); }
        .skill-btn.hook-btn { background: linear-gradient(135deg, #9b59b6, #8e44ad); }

        /* ========== HUD ========== */
        #hud {
            position: absolute;
            top: 1.5%; left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 16px;
            z-index: 50;
        }
        .score {
            background: rgba(0,0,0,0.7);
            color: #fff;
            padding: 5px 14px;
            border-radius: 16px;
            font-size: clamp(13px, 2vw, 22px);
            font-weight: bold;
            letter-spacing: 1px;
            white-space: nowrap;
        }
        .team-a-score { border: 2px solid #e74c3c; }
        .team-b-score { border: 2px solid #3498db; }

        #controls {
            position: absolute;
            bottom: 2%; left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            z-index: 50;
            flex-wrap: wrap;
            justify-content: center;
        }
        .control-btn {
            padding: 7px 14px;
            font-size: clamp(10px, 1.4vw, 15px);
            font-weight: bold;
            border: none;
            border-radius: 22px;
            cursor: pointer;
            color: #fff;
            transition: all 0.3s;
            letter-spacing: 1px;
            -webkit-tap-highlight-color: transparent;
            white-space: nowrap;
        }
        .control-btn:active { transform: scale(0.95); }
        #start-btn { background: linear-gradient(135deg, #27ae60, #2ecc71); }
        #reset-btn { background: linear-gradient(135deg, #7f8c8d, #95a5a6); }
        #switch-btn { background: linear-gradient(135deg, #f39c12, #f1c40f); }

        #possession-indicator {
            position: absolute;
            top: 10%; left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            color: #fff;
            padding: 4px 12px;
            border-radius: 14px;
            font-size: clamp(9px, 1.3vw, 14px);
            z-index: 50;
            letter-spacing: 1px;
            white-space: nowrap;
        }

        /* ========== 足球 ========== */
        #ball {
            position: absolute;
            width: 2.2%; aspect-ratio: 1;
            max-width: 18px; max-height: 18px;
            min-width: 10px; min-height: 10px;
            background: radial-gradient(circle at 35% 35%, #fff, #ddd, #888);
            border-radius: 50%;
            z-index: 15;
            box-shadow: 0 2px 6px rgba(0,0,0,0.4);
            transition: left 0.4s ease-out, top 0.4s ease-out;
        }

        /* ========== 消息 ========== */
        #message {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%,-50%);
            font-size: clamp(18px, 4vw, 36px);
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 20px rgba(0,0,0,0.8);
            z-index: 60;
            pointer-events: none;
            animation: fadeUp 1.5s forwards;
            white-space: nowrap;
        }
        @keyframes fadeUp {
            0% { opacity: 1; transform: translate(-50%,-50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%,-100%) scale(1.3); }
        }
        .field-label {
            position: absolute;
            color: rgba(255,255,255,0.15);
            font-size: clamp(30px, 5vw, 50px);
            font-weight: bold;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="game-wrapper">
        <div id="game-container">
            <!-- 球场 -->
            <div class="field-line field-border"></div>
            <div class="field-line field-center"></div>
            <div class="center-circle"></div>
            <div class="center-dot"></div>
            <div class="penalty-area-left"></div>
            <div class="penalty-area-right"></div>
            <div class="goal-left"></div>
            <div class="goal-right"></div>
            <div class="field-label" style="top:12%;left:50%;transform:translateX(-50%) rotate(180deg);">⚽</div>
            <div class="field-label" style="bottom:12%;left:50%;transform:translateX(-50%);">⚽</div>

            <!-- 足球 -->
            <div id="ball"></div>

            <!-- HUD -->
            <div id="hud">
                <div class="score team-a-score">🔴 <span id="score-a">0</span></div>
                <div style="color:#fff;font-size:clamp(14px,2vw,22px);line-height:2;">VS</div>
                <div class="score team-b-score">🔵 <span id="score-b">0</span></div>
            </div>

            <div id="possession-indicator">⏸️ 等待开始</div>

            <!-- 控制按钮 -->
            <div id="controls">
                <button class="control-btn" id="start-btn">▶ 开始</button>
                <button class="control-btn" id="switch-btn">🔄 攻防</button>
                <button class="control-btn" id="reset-btn">🔄 重置</button>
            </div>

            <div id="message"></div>
        </div>
    </div>

    <script>
        (function() {
            const wrapper = document.getElementById('game-wrapper');
            const container = document.getElementById('game-container');
            const ball = document.getElementById('ball');
            const scoreAEl = document.getElementById('score-a');
            const scoreBEl = document.getElementById('score-b');
            const possessionEl = document.getElementById('possession-indicator');
            const messageEl = document.getElementById('message');

            // ==================== 屏幕适配 ====================
            // 核心：检测竖屏 → 旋转游戏容器90度
            let isPortrait = false;

            function updateLayout() {
                const w = window.innerWidth;
                const h = window.innerHeight;
                isPortrait = h > w;

                if (isPortrait) {
                    // 竖屏：旋转容器，让宽高互换
                    wrapper.classList.add('portrait');
                } else {
                    wrapper.classList.remove('portrait');
                }

                // 重新计算所有元素位置
                repositionAllElements();
                updateAllSkillButtonPositions();
            }

            // 获取游戏容器的实际渲染尺寸（考虑旋转）
            function getContainerSize() {
                const rect = container.getBoundingClientRect();
                return {
                    width: rect.width,
                    height: rect.height
                };
            }

            // ==================== 动态 FIELD 计算 ====================
            function getField() {
                const sz = getContainerSize();
                return {
                    x: sz.width * 0.025,
                    y: sz.height * 0.03,
                    width: sz.width * 0.95,
                    height: sz.height * 0.94
                };
            }

            let gameRunning = false;
            let scoreA = 0;
            let scoreB = 0;
            let possession = 'a';
            let isAttacking = true;
            let selectedPlayer = null;
            let players = [];
            let playerElements = [];
            let skillButtonContainers = [];
            let ballXpct = 50;
            let ballYpct = 50;

            // ==================== 监听屏幕变化 ====================
            const landscapeQuery = window.matchMedia('(orientation: landscape)');

            function onOrientationChange() {
                setTimeout(updateLayout, 300);
            }

            if (landscapeQuery.addEventListener) {
                landscapeQuery.addEventListener('change', onOrientationChange);
            } else if (landscapeQuery.addListener) {
                landscapeQuery.addListener(onOrientationChange);
            }

            let resizeTimer;
            window.addEventListener('resize', () => {
                clearTimeout(resizeTimer);
                resizeTimer = setTimeout(updateLayout, 200);
            });
            window.addEventListener('orientationchange', () => {
                setTimeout(updateLayout, 500);
            });

            // 轮询兜底（微信关键保障）
            let lastW = window.innerWidth;
            let lastH = window.innerHeight;
            setInterval(() => {
                const w = window.innerWidth;
                const h = window.innerHeight;
                if (w !== lastW || h !== lastH) {
                    lastW = w; lastH = h;
                    updateLayout();
                }
            }, 300);

            // ==================== 坐标转换 ====================
            function pctToPixel(xPct, yPct) {
                const f = getField();
                return {
                    x: f.x + (xPct / 100) * f.width,
                    y: f.y + (yPct / 100) * f.height
                };
            }

            function pixelToPct(px, py) {
                const f = getField();
                return {
                    xPct: ((px - f.x) / f.width) * 100,
                    yPct: ((py - f.y) / f.height) * 100
                };
            }

            function setPlayerPosition(player, xPct, yPct) {
                player.xPct = xPct;
                player.yPct = yPct;
                const pos = pctToPixel(xPct, yPct);
                player.el.style.left = pos.x + 'px';
                player.el.style.top = pos.y + 'px';
                player.x = pos.x;
                player.y = pos.y;
            }

            function setBallPosition(xPct, yPct) {
                ballXpct = xPct;
                ballYpct = yPct;
                const pos = pctToPixel(xPct, yPct);
                ball.style.left = pos.x + 'px';
                ball.style.top = pos.y + 'px';
            }

            function getBallPct() {
                const f = getField();
                const bx = parseFloat(ball.style.left) || f.x + f.width / 2;
                const by = parseFloat(ball.style.top) || f.y + f.height / 2;
                return pixelToPct(bx, by);
            }

            function repositionAllElements() {
                players.forEach(p => {
                    const pos = pctToPixel(p.xPct, p.yPct);
                    p.el.style.left = pos.x + 'px';
                    p.el.style.top = pos.y + 'px';
                    p.x = pos.x;
                    p.y = pos.y;
                });
                const bp = pctToPixel(ballXpct, ballYpct);
                ball.style.left = bp.x + 'px';
                ball.style.top = bp.y + 'px';
            }

            // ==================== 创建球员 ====================
            function createPlayers() {
                players = [];
                document.querySelectorAll('.player, .skill-buttons').forEach(el => el.remove());
                playerElements = [];
                skillButtonContainers = [];

                // A队 (左侧，红色) — 守门员 + 4名球员
                const teamAData = [
                    { id: 'a-gk', team: 'a', role: 'goalkeeper', xPct: 5.5, yPct: 50, label: 'A-守' },
                    { id: 'a-1', team: 'a', role: 'runner', xPct: 16, yPct: 35, label: 'A1-跑' },
                    { id: 'a-2', team: 'a', role: 'hook', xPct: 16, yPct: 50, label: 'A2-勾' },
                    { id: 'a-3', team: 'a', role: 'runner', xPct: 16, yPct: 65, label: 'A3-跑' },
                    { id: 'a-4', team: 'a', role: 'hook', xPct: 24, yPct: 50, label: 'A4-勾' },
                ];

                // B队 (右侧，蓝色) — 守门员 + 4名球员
                const teamBData = [
                    { id: 'b-gk', team: 'b', role: 'goalkeeper', xPct: 94.5, yPct: 50, label: 'B-守' },
                    { id: 'b-1', team: 'b', role: 'runner', xPct: 84, yPct: 35, label: 'B1-跑' },
                    { id: 'b-2', team: 'b', role: 'hook', xPct: 84, yPct: 50, label: 'B2-勾' },
                    { id: 'b-3', team: 'b', role: 'runner', xPct: 84, yPct: 65, label: 'B3-跑' },
                    { id: 'b-4', team: 'b', role: 'hook', xPct: 76, yPct: 50, label: 'B4-勾' },
                ];

                [...teamAData, ...teamBData].forEach(data => {
                    const player = createPlayerElement(data);
                    players.push(player);
                });

                updateFormation();
            }

            function createPlayerElement(data) {
                const el = document.createElement('div');
                el.className = `player team-${data.team} ${data.role === 'goalkeeper' ? 'goalkeeper' : ''}`;
                el.id = data.id;
                el.textContent = data.label;
                el.title = data.label;

                const clickHandler = (e) => {
                    e.stopPropagation();
                    e.preventDefault();
                    selectPlayer(data.id);
                };
                el.addEventListener('click', clickHandler);
                el.addEventListener('touchend', clickHandler);

                container.appendChild(el);
                playerElements.push(el);

                if (data.role !== 'goalkeeper') {
                    createSkillButtons(data);
                }

                const p = { ...data, el, speed: 0, xPct: data.xPct, yPct: data.yPct };
                setPlayerPosition(p, data.xPct, data.yPct);
                return p;
            }

            function createSkillButtons(data) {
                const btnContainer = document.createElement('div');
                btnContainer.className = 'skill-buttons';
                btnContainer.style.pointerEvents = 'none';
                container.appendChild(btnContainer);
                skillButtonContainers.push({ container: btnContainer, playerId: data.id });

                const skills = [
                    { name: '跑', cls: 'run-btn', action: 'run' },
                    { name: '铲球', cls: 'tackle-btn', action: 'tackle' },
                    { name: '勾球', cls: 'hook-btn', action: 'hook' },
                ];

                skills.forEach(skill => {
                    const btn = document.createElement('button');
                    btn.className = `skill-btn ${skill.cls}`;
                    btn.textContent = skill.name;
                    const handler = (e) => {
                        e.stopPropagation();
                        e.preventDefault();
                        if (!gameRunning) { showMessage('请先开始比赛！'); return; }
                        if (selectedPlayer !== data.id) selectPlayer(data.id);
                        useSkill(data.id, skill.action);
                    };
                    btn.addEventListener('click', handler);
                    btn.addEventListener('touchend', handler);
                    btnContainer.appendChild(btn);
                });

                updateSkillButtonPosition(data.id);
            }

            function updateSkillButtonPosition(playerId) {
                const p = players.find(p => p.id === playerId);
                if (!p) return;
                const sc = skillButtonContainers.find(s => s.playerId === playerId);
                if (!sc) return;

                const rect = p.el.getBoundingClientRect();
                const containerRect = container.getBoundingClientRect();
                const btnCount = sc.container.children.length;
                const btnWidth = btnCount * 38;
                sc.container.style.left = (rect.left - containerRect.left + rect.width / 2 - btnWidth / 2) + 'px';
                sc.container.style.top = (rect.top - containerRect.top - 28) + 'px';
                sc.container.style.display = (selectedPlayer === playerId && gameRunning) ? 'flex' : 'none';
            }

            function updateAllSkillButtonPositions() {
                players.forEach(p => updateSkillButtonPosition(p.id));
                skillButtonContainers.forEach(sc => {
                    if (sc.playerId !== selectedPlayer || !gameRunning) {
                        sc.container.style.display = 'none';
                    } else {
                        sc.container.style.display = 'flex';
                    }
                });
            }

            // ==================== 阵型 ====================
            function updateFormation() {
                if (isAttacking) {
                    applyAttackingFormation('a');
                    applyDefendingFormation('b');
                } else {
                    applyDefendingFormation('a');
                    applyAttackingFormation('b');
                }
                updateAllSkillButtonPositions();
            }

            function applyAttackingFormation(team) {
                const teamPlayers = players.filter(p => p.team === team && p.role !== 'goalkeeper');
                const baseXPct = team === 'a' ? 32 : 68;
                const startYPct = 28;
                const spacing = 44 / (teamPlayers.length + 1);

                teamPlayers.forEach((p, i) => {
                    const tx = baseXPct + (Math.random() - 0.5) * 5;
                    const ty = startYPct + spacing * (i + 1);
                    animatePlayerPct(p, tx, ty);
                });

                const gk = players.find(p => p.team === team && p.role === 'goalkeeper');
                if (gk) animatePlayerPct(gk, team === 'a' ? 5 : 95, 50);
            }

            function applyDefendingFormation(team) {
                const teamPlayers = players.filter(p => p.team === team && p.role !== 'goalkeeper');
                const baseXPct = team === 'a' ? 18 : 82;

                if (teamPlayers.length >= 3) {
                    const frontX = baseXPct + (team === 'a' ? 10 : -10);
                    animatePlayerPct(teamPlayers[0], frontX, 50);
                    const backX = baseXPct + (team === 'a' ? -4 : 4);
                    animatePlayerPct(teamPlayers[1], backX, 35);
                    animatePlayerPct(teamPlayers[2], backX, 65);
                    if (teamPlayers[3]) {
                        animatePlayerPct(teamPlayers[3], baseXPct + (team === 'a' ? -10 : 10), 50);
                    }
                }

                const gk = players.find(p => p.team === team && p.role === 'goalkeeper');
                if (gk) animatePlayerPct(gk, team === 'a' ? 5 : 95, 50);
            }

            function animatePlayerPct(player, targetXPct, targetYPct) {
                const startXPct = player.xPct;
                const startYPct = player.yPct;
                const duration = 500;
                const startTime = performance.now();

                function step(now) {
                    const elapsed = now - startTime;
                    const progress = Math.min(elapsed / duration, 1);
                    const ease = 1 - Math.pow(1 - progress, 3);
                    const curXPct = startXPct + (targetXPct - startXPct) * ease;
                    const curYPct = startYPct + (targetYPct - startYPct) * ease;
                    setPlayerPosition(player, curXPct, curYPct);
                    if (progress < 1) {
                        requestAnimationFrame(step);
                    } else {
                        setPlayerPosition(player, targetXPct, targetYPct);
                        updateAllSkillButtonPositions();
                    }
                }
                requestAnimationFrame(step);
            }

            // ==================== 选球员 ====================
            function selectPlayer(playerId) {
                if (selectedPlayer) {
                    const prev = players.find(p => p.id === selectedPlayer);
                    if (prev) prev.el.classList.remove('selected');
                }
                selectedPlayer = playerId;
                const player = players.find(p => p.id === playerId);
                if (player) {
                    player.el.classList.add('selected');
                    if (player.team !== possession && gameRunning) {
                        showMessage('当前是对方球权！');
                    }
                }
                updateAllSkillButtonPositions();
            }

            // ==================== 技能系统 ====================
            function useSkill(playerId, skill) {
                const player = players.find(p => p.id === playerId);
                if (!player) return;
                switch (skill) {
                    case 'run': doRun(player); break;
                    case 'tackle': doTackle(player); break;
                    case 'hook': doHook(player); break;
                }
            }

            function doRun(player) {
                player.el.classList.add('running');
                setTimeout(() => player.el.classList.remove('running'), 300);

                const targetXPct = player.team === 'a'
                    ? Math.min(98, player.xPct + 18)
                    : Math.max(2, player.xPct - 18);
                const targetYPct = player.yPct + (Math.random() - 0.5) * 12;
                const clampedY = Math.max(8, Math.min(92, targetYPct));

                animatePlayerPct(player, targetXPct, clampedY);

                const bp = getBallPct();
                const distPct = Math.hypot(player.xPct - bp.xPct, player.yPct - bp.yPct);
                if (distPct < 8 && player.team === possession) {
                    setBallPosition(targetXPct + (player.team === 'a' ? 2 : -2), clampedY);
                    checkGoal();
                }
                showMessage(`${player.label} 冲刺！`);
                updateAllSkillButtonPositions();
            }

            function doTackle(player) {
                let nearestEnemy = null;
                let minDist = Infinity;
                players.forEach(p => {
                    if (p.team !== player.team && p.role !== 'goalkeeper') {
                        const dist = Math.hypot(player.xPct - p.xPct, player.yPct - p.yPct);
                        if (dist < minDist) { minDist = dist; nearestEnemy = p; }
                    }
                });

                if (nearestEnemy && minDist < 25) {
                    const midX = (player.xPct + nearestEnemy.xPct) / 2;
                    const midY = (player.yPct + nearestEnemy.yPct) / 2;
                    animatePlayerPct(player, midX, midY);

                    if (Math.random() < 0.6) {
                        possession = player.team;
                        setBallPosition(midX, midY);
                        updatePossessionDisplay();
                        showMessage(`${player.label} 铲球成功！`);
                    } else {
                        showMessage(`${player.label} 铲球失败！`);
                    }
                } else {
                    showMessage(`${player.label} 附近无目标！`);
                }
                updateAllSkillButtonPositions();
            }

            function doHook(player) {
                const bp = getBallPct();
                const dist = Math.hypot(player.xPct - bp.xPct, player.yPct - bp.yPct);

                if (dist < 30) {
                    const pullX = player.xPct + (player.team === 'a' ? 3 : -3);
                    setBallPosition(pullX, player.yPct);
                    possession = player.team;
                    updatePossessionDisplay();
                    showMessage(`${player.label} 勾球成功！`);
                } else {
                    showMessage(`${player.label} 离球太远！`);
                }
                updateAllSkillButtonPositions();
            }

            // ==================== 进球检测 ====================
            function checkGoal() {
                const bp = getBallPct();

                // 左球门 (B队得分): x≈1%~3.3%, y≈43%~57%
                if (bp.xPct <= 3.5 && bp.yPct > 42 && bp.yPct < 58) {
                    scoreB++;
                    scoreBEl.textContent = scoreB;
                    showMessage('⚽ B队进球！');
                    resetBall();
                }

                // 右球门 (A队得分): x≈96.7%~99%, y≈43%~57%
                if (bp.xPct >= 96.5 && bp.yPct > 42 && bp.yPct < 58) {
                    scoreA++;
                    scoreAEl.textContent = scoreA;
                    showMessage('⚽ A队进球！');
                    resetBall();
                }
            }

            function resetBall() {
                setBallPosition(50, 50);
                possession = possession === 'a' ? 'b' : 'a';
                updatePossessionDisplay();
            }

            // ==================== 消息系统 ====================
            function showMessage(msg) {
                messageEl.textContent = msg;
                messageEl.style.animation = 'none';
                messageEl.offsetHeight;
                messageEl.style.animation = 'fadeUp 1.5s forwards';
            }

            function updatePossessionDisplay() {
                const teamName = possession === 'a' ? 'A队(红)' : 'B队(蓝)';
                const status = isAttacking ? '进攻' : '防守';
                possessionEl.textContent = `⚽ ${teamName} | ${status}`;
                possessionEl.style.border = `2px solid ${possession === 'a' ? '#e74c3c' : '#3498db'}`;
            }

            // ==================== 游戏控制 ====================
            function startGame() {
                gameRunning = true;
                selectedPlayer = null;
                players.forEach(p => p.el.classList.remove('selected'));
                resetBall();
                possession = 'a';
                isAttacking = true;
                updatePossessionDisplay();
                updateFormation();
                showMessage('⚽ 比赛开始！');
                updateAllSkillButtonPositions();
            }

            function resetGame() {
                gameRunning = false;
                scoreA = 0; scoreB = 0;
                scoreAEl.textContent = '0'; scoreBEl.textContent = '0';
                selectedPlayer = null;
                possession = 'a';
                isAttacking = true;
                possessionEl.textContent = '⏸️ 等待开始';
                possessionEl.style.border = 'none';
                players.forEach(p => p.el.classList.remove('selected'));
                setBallPosition(50, 50);
                createPlayers();
                updateAllSkillButtonPositions();
                showMessage('已重置');
            }

            function switchAttackDefense() {
                if (!gameRunning) { showMessage('请先开始比赛！'); return; }
                isAttacking = !isAttacking;
                updatePossessionDisplay();
                updateFormation();
                showMessage(isAttacking ? '⚔️ 进攻模式' : '🛡️ 防守模式');
            }

            // ==================== 事件绑定 ====================
            const btnEvents = [
                { id: 'start-btn', fn: startGame },
                { id: 'reset-btn', fn: resetGame },
                { id: 'switch-btn', fn: switchAttackDefense },
            ];
            btnEvents.forEach(({ id, fn }) => {
                const el = document.getElementById(id);
                el.addEventListener('click', fn);
                el.addEventListener('touchend', (e) => { e.preventDefault(); fn(); });
            });

            // 点击空白取消选择
            container.addEventListener('click', (e) => {
                if (e.target === container || e.target.classList.contains('field-line') ||
                    e.target.classList.contains('center-circle') || e.target.classList.contains('center-dot') ||
                    e.target.classList.contains('penalty-area-left') || e.target.classList.contains('penalty-area-right') ||
                    e.target.classList.contains('field-label')) {
                    if (selectedPlayer) {
                        const prev = players.find(p => p.id === selectedPlayer);
                        if (prev) prev.el.classList.remove('selected');
                        selectedPlayer = null;
                        updateAllSkillButtonPositions();
                    }
                }
            });

            // 键盘控制
            document.addEventListener('keydown', (e) => {
                if (!gameRunning || !selectedPlayer) return;
                const player = players.find(p => p.id === selectedPlayer);
                if (!player || player.team !== possession) return;

                const stepPct = 2.5;
                let xPct = player.xPct;
                let yPct = player.yPct;

                switch (e.key.toLowerCase()) {
                    case 'w': case 'arrowup': yPct = Math.max(5, yPct - stepPct); break;
                    case 's': case 'arrowdown': yPct = Math.min(95, yPct + stepPct); break;
                    case 'a': case 'arrowleft': xPct = Math.max(3, xPct - stepPct); break;
                    case 'd': case 'arrowright': xPct = Math.min(97, xPct + stepPct); break;
                    case '1': useSkill(selectedPlayer, 'run'); return;
                    case '2': useSkill(selectedPlayer, 'tackle'); return;
                    case '3': useSkill(selectedPlayer, 'hook'); return;
                    default: return;
                }

                setPlayerPosition(player, xPct, yPct);
                updateAllSkillButtonPositions();

                const bp = getBallPct();
                const dist = Math.hypot(xPct - bp.xPct, yPct - bp.yPct);
                if (dist < 6 && player.team === possession) {
                    setBallPosition(xPct + (player.team === 'a' ? 2 : -2), yPct);
                    checkGoal();
                }
            });

            // ==================== 初始化 ====================
            function init() {
                createPlayers();
                setBallPosition(50, 50);
                updateLayout();
            }

            init();
            console.log('⚽ 足球游戏已就绪！');
        })();
    </script>
</body>
</html>
